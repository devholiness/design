<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual de Identidade Visual — IEHP</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --azul:#2596be;
    --preto:#0a0a0a;
    --branco:#ffffff;
    --cinza:#3d4144;
    --success:#28a745;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:'Montserrat',sans-serif;background:#fff;color:#000;}

  /* ══ NAV (AUMENTADO) ══ */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    background:rgba(10,10,10,0.97);
    backdrop-filter:blur(10px);
    display:flex;align-items:center;
    justify-content:space-between;
    padding:0 32px;height:64px; /* Altura ajustada para o menu maior */
    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  nav .nav-logo{
    color:#fff;font-weight:900;font-size:18px;
    letter-spacing:3px;text-transform:uppercase;
    flex-shrink:0;
  }
  nav ul{
    list-style:none;display:flex;gap:24px;
    overflow-x:auto;padding:0 8px;
    scrollbar-width:none;
  }
  nav ul::-webkit-scrollbar{display:none;}
  nav ul li a{
    color:#fff;text-decoration:none;
    font-size:13px; /* AUMENTADO (Antes era 9px) */
    font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
    opacity:0.65;transition:opacity .2s,color .2s;
    white-space:nowrap;
  }
  nav ul li a:hover, nav ul li a.active{opacity:1;color:var(--azul);}

  /* ══ HAMBURGER (mobile) ══ */
  .hamburger{
    display:none;flex-direction:column;gap:5px;
    cursor:pointer;padding:4px;background:none;border:none;
  }
  .hamburger span{
    display:block;width:22px;height:2px;
    background:#fff;border-radius:2px;
    transition:all .3s;
  }
  .mobile-menu{
    display:none;position:fixed;top:64px;left:0;right:0;
    background:rgba(10,10,10,0.98);z-index:99;
    padding:16px 0;border-bottom:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
  }
  .mobile-menu.open{display:block;}
  .mobile-menu ul{list-style:none;display:flex;flex-direction:column;}
  .mobile-menu ul li a{
    display:block;padding:14px 32px;
    color:#fff;text-decoration:none;font-size:13px;
    font-weight:700;letter-spacing:2px;text-transform:uppercase;
    opacity:0.6;transition:opacity .2s,color .2s;
    border-bottom:1px solid rgba(255,255,255,0.04);
  }
  .mobile-menu ul li a:hover{opacity:1;color:var(--azul);}

  /* ══ SECTIONS ══ */
  section{
    padding:120px 80px 80px;
    min-height:100vh;
    display:flex;flex-direction:column;justify-content:center;
    scroll-margin-top: 64px;
  }
  section:nth-child(even){background:#f7f7f7;}

  .section-label{
    font-size:10px;font-weight:700;letter-spacing:4px;
    color:var(--azul);text-transform:uppercase;
    margin-bottom:12px;
    display:flex;align-items:center;gap:10px;
  }
  .section-label::before{
    content:'';display:block;width:28px;height:2px;background:var(--azul);
  }
  .section-title{
    font-size:clamp(24px,4vw,48px);font-weight:900;
    text-transform:uppercase;letter-spacing:1px;
    margin-bottom:16px;line-height:1.1;
  }
  .section-desc{
    font-size:13px;font-weight:300;color:#666;
    max-width:580px;line-height:1.9;margin-bottom:48px;
  }

  /* ══ CAPA ══ */
  #capa{
    background:var(--preto);
    justify-content:flex-start;
    padding:0;
    min-height:100vh;
    position:relative;
    overflow:hidden;
  }
  .capa-bg{
    position:absolute;inset:0;
    background:
      radial-gradient(ellipse 80% 60% at 80% 20%,rgba(37,150,190,0.12) 0%,transparent 60%),
      radial-gradient(ellipse 60% 80% at 10% 80%,rgba(37,150,190,0.07) 0%,transparent 60%);
  }
  .capa-grid-lines{
    position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
    background-size:60px 60px;
  }
  .capa-circle-1{
    position:absolute;width:700px;height:700px;border-radius:50%;
    border:1px solid rgba(37,150,190,0.08);top:-200px;right:-200px;
  }
  .capa-circle-2{
    position:absolute;width:500px;height:500px;border-radius:50%;
    border:1px solid rgba(37,150,190,0.06);top:-100px;right:-100px;
  }
  .capa-circle-3{
    position:absolute;width:300px;height:300px;border-radius:50%;
    border:1px solid rgba(37,150,190,0.1);bottom:-80px;left:-80px;
  }
  .capa-content{
    position:relative;z-index:2;
    display:flex;flex-direction:column;
    justify-content:center;
    width:100%;max-width:900px;
    min-height:100vh;
    padding:100px 80px;
  }
  .capa-tag{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(37,150,190,0.15);
    border:1px solid rgba(37,150,190,0.3);
    color:var(--azul);
    font-size:9px;font-weight:700;
    letter-spacing:4px;text-transform:uppercase;
    padding:7px 16px;border-radius:100px;
    margin-bottom:40px;width:fit-content;
  }
  .capa-tag::before{
    content:'';width:6px;height:6px;
    border-radius:50%;background:var(--azul);
    animation:pulse 2s infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;transform:scale(1);}
    50%{opacity:.5;transform:scale(1.3);}
  }
  .capa-h1{
    font-size:clamp(40px,8vw,100px);
    font-weight:900;line-height:.95;
    letter-spacing:-3px;color:#fff;
    margin-bottom:32px;text-transform:uppercase;
  }
  .capa-h1 span{color:var(--azul);display:block;}
  .capa-desc{
    font-size:13px;font-weight:300;
    color:#666;line-height:1.9;
    margin-bottom:56px;max-width:480px;
  }
  .capa-desc strong{color:var(--azul);font-weight:400;}
  .capa-divider{
    width:40px;height:2px;
    background:rgba(37,150,190,0.4);margin-bottom:32px;
  }
  .capa-meta{display:flex;gap:40px;flex-wrap:wrap;}
  .capa-meta-label{
    font-size:9px;font-weight:700;
    letter-spacing:3px;text-transform:uppercase;
    color:#444;margin-bottom:6px;
  }
  .capa-meta-value{font-size:14px;font-weight:700;color:#fff;}

  /* ══ MARCA (LOGOTIPOS MÁXIMOS E AMPLOS) ══ */
  .logo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;}
  .logo-card{
    border-radius:16px;padding:60px 40px;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:32px;min-height:260px;transition:transform .2s;
  }
  .logo-card:hover{transform:translateY(-4px);}
  .logo-card img{
    width: 85%;
    max-width:380px; /* AUMENTADO: Otimizado para ficar o maior possível */
    height:auto;
    max-height:120px; /* AUMENTADO */
    object-fit:contain;
  }
  .logo-card-label{
    font-size:10px;font-weight:700;letter-spacing:3px;
    text-transform:uppercase;opacity:0.5;
  }
  .bg-white{background:#fff;border:1px solid #eee;}
  .bg-white .logo-card-label{color:#000;}
  .bg-black{background:#000;}
  .bg-black .logo-card-label{color:#fff;}
  .bg-blue{background:var(--azul);}
  .bg-blue .logo-card-label{color:#fff;}
  .bg-gray{background:var(--cinza);}
  .bg-gray .logo-card-label{color:#fff;}

  /* ══ MONO (AUMENTADO) ══ */
  .mono-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;}
  .mono-card{
    border-radius:16px;padding:68px 40px;
    display:flex;flex-direction:column;
    align-items:center;gap:32px;min-height:260px;transition:transform .2s;
  }
  .mono-card:hover{transform:translateY(-4px);}
  .mono-card img{
    width: 85%;
    max-width:360px; /* AUMENTADO */
    height:auto;
    max-height:110px; /* AUMENTADO */
    object-fit:contain;
  }
  .mono-label{
    font-size:10px;font-weight:700;letter-spacing:3px;
    text-transform:uppercase;opacity:0.5;
  }

  /* ══ PROTEÇÃO ══ */
  .protection-wrap{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;}
  .protection-preview{
    background:#f0f0f0;border-radius:16px;padding:60px;
    display:flex;align-items:center;justify-content:center;
  }
  .protection-preview img{
    width: 90%;
    max-width:320px;
    height: auto;
    outline:2px dashed rgba(37,150,190,0.5);
    outline-offset:24px;
  }
  .protection-cards{display:flex;flex-direction:column;gap:16px;}
  .protection-card{
    background:#fff;border-radius:12px;padding:24px 28px;
    border-left:4px solid var(--azul);
    box-shadow:0 2px 12px rgba(0,0,0,0.06);
  }
  .protection-card h4{
    font-size:9px;letter-spacing:3px;color:var(--azul);
    text-transform:uppercase;font-weight:700;margin-bottom:8px;
  }
  .protection-card p{font-size:28px;font-weight:900;line-height:1;}
  .protection-card span{font-size:11px;color:#888;font-weight:300;}

  /* ══ USO INCORRETO ══ */
  .incorrect-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .incorrect-card{
    border:1.5px solid #eee;border-radius:12px;padding:32px 16px;
    display:flex;flex-direction:column;align-items:center;gap:20px;
    position:relative;overflow:hidden;transition:border-color .2s;
    min-height: 160px;justify-content: center;
  }
  .incorrect-card:hover{border-color:#e74c3c;}
  .incorrect-x{
    position:absolute;top:10px;left:10px;
    background:#e74c3c;color:#fff;
    width:20px;height:20px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:10px;font-weight:900;
  }
  .incorrect-card img{
    width: 85%;
    max-width:180px;
    height: auto;
    max-height:55px;
    object-fit:contain;opacity:0.45;
  }
  .incorrect-card p{
    font-size:9px;font-weight:700;letter-spacing:1px;
    text-transform:uppercase;color:#e74c3c;text-align:center;
  }

  /* ══ TIPOGRAFIA ══ */
  .typo-wrap{display:grid;grid-template-columns:1fr 1fr;gap:32px;}
  .typo-weights{display:flex;flex-direction:column;gap:16px;}
  .typo-card{
    background:#fff;border-radius:12px;padding:28px 32px;
    border:1px solid #eee;display:flex;align-items:center;gap:20px;
  }
  .typo-sample-big{font-size:48px;line-height:1;color:#000;min-width:72px;}
  .typo-name{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--azul);margin-bottom:4px;}
  .typo-weight-desc{font-size:11px;color:#888;font-weight:300;}
  .typo-hierarchy{background:#fff;border-radius:12px;padding:32px;border:1px solid #eee;}
  .typo-hierarchy h3{
    font-size:10px;font-weight:700;letter-spacing:3px;
    color:var(--azul);text-transform:uppercase;margin-bottom:20px;
  }
  .hier-row{
    display:flex;align-items:baseline;gap:16px;
    padding:12px 0;border-bottom:1px solid #f0f0f0;
  }
  .hier-row:last-child{border-bottom:none;}
  .hier-tag{font-size:9px;font-weight:700;letter-spacing:2px;color:#bbb;width:40px;flex-shrink:0;}
  .h1-s{font-size:28px;font-weight:900;}
  .h2-s{font-size:22px;font-weight:700;}
  .h3-s{font-size:17px;font-weight:700;}
  .body-s{font-size:13px;font-weight:300;color:#444;}
  .cap-s{font-size:11px;font-weight:300;color:#999;}

  /* ══ CORES ══ */
  .colors-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  .color-card{border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
  .color-swatch{height:160px;}
  .color-info{padding:24px;background:#fff;}
  .color-name{font-size:14px;font-weight:800;margin-bottom:12px;}
  .color-codes{display:flex;flex-direction:column;gap:6px;}
  .color-code{
    font-size:11px;color:#aaa;font-weight:300;
    cursor:pointer;padding:4px;border-radius:4px;
    transition:background .2s;display:flex;justify-content:space-between;
  }
  .color-code:hover{background:#f0f4f8;}
  .color-code span{font-weight:700;color:#000;}
  .color-code::after{content:'copiar';font-size:8px;text-transform:uppercase;color:var(--azul);opacity:0;transition:opacity .2s;}
  .color-code:hover::after{opacity:1;}

  /* Toast Notification */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--preto);
    color: var(--branco);
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    display: none;
    z-index: 1000;
    border: 1px solid rgba(255,255,255,0.1);
  }

  /* ══ PROPORÇÃO ══ */
  .prop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
  .prop-card{background:#fff;border-radius:12px;padding:32px;border:1px solid #eee;}
  .prop-card h3{
    font-size:10px;font-weight:700;letter-spacing:2px;
    color:var(--azul);text-transform:uppercase;margin-bottom:24px;
  }
  .prop-bar-group{display:flex;flex-direction:column;gap:14px;}
  .prop-bar-item{display:flex;flex-direction:column;gap:5px;}
  .prop-bar-label{display:flex;justify-content:space-between;font-size:11px;font-weight:700;}
  .prop-bar-track{height:6px;background:#eee;border-radius:4px;overflow:hidden;}
  .prop-bar-fill{height:100%;border-radius:4px;}

  /* ══ ARQUIVOS ══ */
  .files-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
  .file-card{
    background:#fff;border-radius:12px;padding:28px 16px;
    text-align:center;border:1px solid #eee;
    display:flex;flex-direction:column;justify-content:space-between;min-height:240px;
    transition:transform .2s,box-shadow .2s,border-color .2s;
  }
  .file-card:hover{transform:translateY(-6px);box-shadow:0 12px 32px rgba(0,0,0,0.1);border-color:var(--azul);}
  .file-icon{font-size:36px;margin-bottom:12px;}
  .file-name{font-size:12px;font-weight:800;letter-spacing:1px;margin-bottom:6px;color:var(--preto);}
  .file-desc{font-size:10px;color:#999;font-weight:300;line-height:1.6;margin-bottom:16px;}
  .file-links{display:flex;flex-direction:column;gap:6px;}
  .btn-download{
    display:block;padding:8px;background:#f7f7f7;color:var(--cinza);
    text-decoration:none;font-size:9px;font-weight:700;letter-spacing:1px;
    border-radius:6px;transition:background .2s,color .2s;
  }
  .btn-download:hover{background:var(--azul);color:#fff;}
  .btn-zip{background:var(--preto);color:#fff;}
  .btn-zip:hover{background:var(--azul);}

  /* ══ FOOTER ══ */
  footer{
    background:var(--preto);color:#fff;
    text-align:center;padding:40px 24px;
    font-size:11px;font-weight:300;
    letter-spacing:1px;opacity:0.6;
    line-height:1.8;
  }

  /* ══ RESPONSIVO — TABLET (max 900px) ══ */
  @media(max-width:900px){
    nav ul{display:none;}
    .hamburger{display:flex;}

    section{padding:90px 32px 60px;}

    .capa-content{padding:90px 32px 60px;}
    .capa-h1{letter-spacing:-1px;}

    .logo-grid{grid-template-columns:1fr 1fr;gap:16px;}
    .logo-card{padding:40px 20px;min-height:200px;}
    .mono-grid{grid-template-columns:1fr 1fr;gap:16px;}
    .mono-card{padding:40px 20px;min-height:200px;}
    .incorrect-grid{grid-template-columns:repeat(2,1fr);}
    .typo-wrap{grid-template-columns:1fr;}
    .colors-grid{grid-template-columns:1fr 1fr;}
    .prop-grid{grid-template-columns:1fr;}
    .files-grid{grid-template-columns:repeat(2,1fr);}

    .protection-wrap{grid-template-columns:1fr;}
    .protection-preview{padding:40px;}
  }

  /* ══ RESPONSIVO — MOBILE (max 600px) ══ */
  @media(max-width:600px){
    nav{padding:0 20px;}
    nav .nav-logo{font-size:14px;letter-spacing:2px;}

    section{padding:80px 20px 52px;min-height:auto;}

    .capa-content{padding:80px 20px 52px;min-height:100vh;}
    .capa-tag{font-size:8px;letter-spacing:2px;padding:6px 12px;}
    .capa-h1{font-size:clamp(36px,11vw,56px);letter-spacing:-1px;margin-bottom:20px;}
    .capa-desc{font-size:12px;margin-bottom:36px;}
    .capa-meta{gap:24px;}
    .capa-meta-value{font-size:12px;}

    .section-title{font-size:clamp(22px,7vw,32px);}
    .section-desc{font-size:12px;margin-bottom:32px;}

    .logo-grid{grid-template-columns:1fr;}
    .logo-card{padding:32px 20px;min-height:140px;}
    .logo-card img{max-width:220px;max-height:80px;}

    .mono-grid{grid-template-columns:1fr;}
    .mono-card{padding:36px 20px;min-height:140px;}
    .mono-card img{max-width:200px;max-height:75px;}

    .protection-wrap{grid-template-columns:1fr;gap:24px;}
    .protection-preview{padding:32px 20px;}
    .protection-preview img{max-width:200px;outline-offset:16px;}
    .protection-card p{font-size:24px;}

    .incorrect-grid{grid-template-columns:1fr 1fr;}
    .incorrect-card{padding:20px 12px;min-height:110px;}
    .incorrect-card img{max-width:110px;}
    .incorrect-card p{font-size:8px;}

    .typo-wrap{grid-template-columns:1fr;gap:16px;}
    .typo-card{padding:20px 20px;gap:16px;}
    .typo-sample-big{font-size:36px;min-width:52px;}
    .typo-hierarchy{padding:24px 20px;}
    .h1-s{font-size:22px;}
    .h2-s{font-size:18px;}
    .h3-s{font-size:15px;}

    .colors-grid{grid-template-columns:1fr;}
    .color-swatch{height:120px;}

    .prop-grid{grid-template-columns:1fr;gap:16px;}
    .prop-card{padding:24px 20px;}

    .files-grid{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">IEHP</div>
  <ul>
    <li><a href="#capa" class="nav-link">Início</a></li>
    <li><a href="#marca" class="nav-link">Marca</a></li>
    <li><a href="#mono" class="nav-link">Monocromática</a></li>
    <li><a href="#protecao" class="nav-link">Prote
